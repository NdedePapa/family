<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Family Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="d3.min.js"></script>
<script src="i18n.js"></script>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">🌳 My Family</div>
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingMsg">Connecting…</div>
</div>

<!-- Header -->
<div class="hdr">
  <div class="logo">My <em>Family</em></div>
  <div class="hdr-search">
    <span class="si">⌕</span>
    <input id="searchInput" type="text" placeholder="Search by name, town, or notes…" autocomplete="off" aria-label="Search family members">
    <button class="search-clear" id="searchClear" onclick="clearSearch()" title="Clear search (Esc)" style="display:none">✕</button>
    <div class="search-results" id="searchResults" style="display:none">
      <span class="results-count" id="resultsCount"></span>
      <button class="result-nav" id="prevResult" onclick="navigateResults(-1)" title="Previous result (Shift+Enter)">↑</button>
      <button class="result-nav" id="nextResult" onclick="navigateResults(1)" title="Next result (Enter)">↓</button>
    </div>
  </div>
  <div class="conn-bar loading" id="connBar">
    <div class="conn-dot"></div>
    <span id="connText">Connecting…</span>
  </div>
  <div class="hdr-right">
    <button class="btn-help" onclick="toggleLanguage()" title="Switch language" id="langBtn">🌐</button>
    <button class="btn-help" onclick="toggleAdminMode()" id="adminBtn">🔒</button>
    <button class="btn-help" onclick="toggleTheme()" id="themeBtn">☀</button>
    <button class="btn-help" onclick="openHelp()">?</button>
    <button class="btn btn-green btn-sm" onclick="openExport()" id="backupBtn" title="Backup data">📤 <span id="backupText">Backup</span></button>
    <button class="btn btn-purple btn-sm" onclick="openImport()" id="importBtn" title="Import data">📥 <span id="importText">Import</span></button>
    <button class="btn btn-blue btn-sm" onclick="openChangeRequests()" id="requestsBtn" style="position:relative" title="View change requests">
      <span id="requestsText">📋 Requests</span>
      <span id="requestsBadge" style="display:none;position:absolute;top:-4px;right:-4px;background:#c0392b;color:#fff;border-radius:10px;padding:2px 6px;font-size:9px;font-weight:700"></span>
    </button>
    <button class="btn btn-ghost btn-icon" onclick="toggleMatrilineal()" id="matriBtn" title="Show matrilineal lineage only">♀</button>
    <button class="btn btn-ghost btn-icon" onclick="resetView()" id="fitBtn" title="Fit tree to screen">⊙</button>
    <button class="btn btn-gold" onclick="openAdd(null)" id="addBtn" title="Add new member">＋ <span id="addText">Add Member</span></button>
    <div class="pills" id="pills"></div>
  </div>
</div>

<!-- Main Canvas + Sidebar -->
<div class="main">
  <div class="canvas" id="canvas">
    <svg id="svg" tabindex="0"></svg>
    <div class="hint-bar" id="hintBar">Scroll to zoom · Drag to pan</div>
    <div class="legend" id="legend"></div>
    <div class="ctrl-cluster">
      <button class="ctrl-btn" onclick="zoomBy(1.3)" title="Zoom in">＋</button>
      <button class="ctrl-btn" onclick="zoomBy(0.77)" title="Zoom out">−</button>
    </div>
  </div>
  <div class="sidebar" id="sidebar">
    <div class="sb-scroll" id="sbContent"></div>
  </div>
</div>

<!-- Add/Edit Member Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-stripe" style="background:linear-gradient(90deg,transparent,var(--gold),transparent)"></div>
    <div id="formModalContent"></div>
  </div>
</div>

<!-- Welcome/Help Modal -->
<div class="overlay" id="helpOverlay">
  <div class="welcome-modal" id="welcomeContent"></div>
</div>

<!-- Export/Backup Modal -->
<div class="overlay" id="exOverlay">
  <div class="modal" style="max-width:460px">
    <div class="modal-stripe" style="background:linear-gradient(90deg,transparent,var(--green),transparent)"></div>
    <div id="exportContent"></div>
  </div>
</div>

<!-- Import/Restore Modal -->
<div class="overlay" id="importOverlay">
  <div class="modal" style="max-width:460px">
    <div class="modal-stripe" style="background:linear-gradient(90deg,transparent,var(--purple),transparent)"></div>
    <div id="importContent"></div>
  </div>
</div>

<!-- Change Requests Modal -->
<div class="overlay" id="requestsOverlay">
  <div class="modal" style="max-width:600px">
    <div class="modal-stripe" style="background:linear-gradient(90deg,transparent,#2e9fb5,transparent)"></div>
    <div id="requestsHeader"></div>
    <div id="requestsList" style="max-height:400px;overflow-y:auto"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeRequests()">Close</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="overlay" id="cfOverlay">
  <div class="confirm-box">
    <span class="confirm-icon">⚠</span>
    <h3 id="cfTitle">Confirm</h3>
    <p id="cfMsg">Are you sure?</p>
    <div class="confirm-btns">
      <button class="btn btn-ghost" onclick="cfResolve(false)">No, cancel</button>
      <button class="btn btn-red" onclick="cfResolve(true)">Yes, confirm</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
